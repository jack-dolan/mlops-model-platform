name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check src/

      - name: Format check
        run: black --check src/ tests/

      - name: Type check
        run: mypy src/

      - name: Train model
        run: python training/train_iris.py

      - name: Test
        run: pytest --cov=src --cov-report=xml

  build:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Train model for fallback artifact
        run: |
          pip install scikit-learn mlflow
          python training/train_iris.py

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cleanup-ghcr:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      packages: write

    steps:
      - name: Delete old image versions
        run: |
          # Fetch all version IDs upfront (excluding "latest") so that deletions
          # don't shift API pagination and cause spurious "Package not found" errors.
          # Pipe through tail to keep the 30 newest, then delete everything older.
          # || true tolerates 404s in case a version was already removed.
          gh api --paginate "/user/packages/container/mlops-model-platform/versions" \
            --jq '.[] | select(.metadata.container.tags | index("latest") | not) | .id' \
          | tail -n +31 \
          | while read id; do
              gh api --method DELETE "/user/packages/container/mlops-model-platform/versions/$id" 2>/dev/null || true
            done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  apply-infra:
    runs-on: self-hosted
    needs: build
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set PATH
        run: echo "/opt/homebrew/bin:/usr/local/bin" >> $GITHUB_PATH

      - name: Apply shared infra manifests
        run: |
          kubectl apply -f kubernetes/mlflow/ingress.yaml
          kubectl apply -f kubernetes/monitoring/ingress.yaml

  deploy-staging:
    runs-on: self-hosted
    needs: build
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set PATH
        run: echo "/opt/homebrew/bin:/usr/local/bin" >> $GITHUB_PATH

      - name: Deploy to staging
        run: |
          sed -i '' "s|image: ghcr.io/jack-dolan/mlops-model-platform:.*|image: ${{ env.IMAGE }}:${{ github.sha }}|" kubernetes/base/deployment.yaml
          kubectl apply -k kubernetes/overlays/staging
          kubectl rollout status deployment/model-service -n staging --timeout=300s

      - name: Verify deployment
        run: |
          kubectl wait --for=condition=ready pod -l app=model-service -n staging --timeout=120s
          kubectl exec -n staging deploy/model-service -- python -c "import urllib.request; print(urllib.request.urlopen('http://localhost:8000/health').read().decode())"

      - name: Prune unused images
        run: limactl shell k3s sudo crictl rmi --prune

  deploy-production:
    runs-on: self-hosted
    needs: deploy-staging
    if: github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set PATH
        run: echo "/opt/homebrew/bin:/usr/local/bin" >> $GITHUB_PATH

      - name: Deploy to production
        run: |
          sed -i '' "s|image: ghcr.io/jack-dolan/mlops-model-platform:.*|image: ${{ env.IMAGE }}:${{ github.sha }}|" kubernetes/base/deployment.yaml
          kubectl apply -k kubernetes/overlays/production
          kubectl rollout status deployment/model-service -n production --timeout=300s

      - name: Verify deployment
        run: |
          kubectl wait --for=condition=ready pod -l app=model-service -n production --timeout=120s
          kubectl exec -n production deploy/model-service -- python -c "import urllib.request; print(urllib.request.urlopen('http://localhost:8000/health').read().decode())"

      - name: Prune unused images
        run: limactl shell k3s sudo crictl rmi --prune
