apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: staging
resources:
  - ../../base
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: model-service
  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: mlops-api-staging.dolanjack.com
    target:
      kind: Ingress
      name: model-service
