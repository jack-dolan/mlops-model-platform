apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: model-service
spec:
  ingressClassName: traefik
  rules:
    - host: placeholder.dolanjack.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: model-service
                port:
                  number: 80
